---
layout: default
---

{% include base_path %}

<style>
  /* ===== One-page home styles (inlined so they never depend on a cached main.css) ===== */
  html { scroll-behavior: smooth; }

  .masthead__menu-item a.is-active { color: var(--global-link-color); font-weight: 700; }

  #main.home { max-width: 900px; margin: 0 auto; padding: 0 1.25rem; }

  .home-section { padding: 3.5rem 0 1rem; scroll-margin-top: 90px; }
  .home-section + .home-section { border-top: 1px solid var(--global-border-color); }

  .section-title { font-size: 1.6rem; font-weight: 700; margin: 0 0 1.25rem; letter-spacing: -0.01em; }
  .section-lead { font-size: 1.02rem; line-height: 1.7; max-width: 68ch; opacity: 0.92; }

  /* Hero: photo left (small oval), text right */
  .home-hero { padding-top: 5.5rem; border-top: 0; }
  .hero-inner { display: flex; gap: 2.25rem; align-items: center; flex-wrap: wrap; }
  .hero-avatar { flex: 0 0 auto; }
  .hero-avatar img {
    display: block;
    width: 130px !important;
    height: 165px !important;
    max-width: 130px !important;
    object-fit: cover;
    border-radius: 50%;
    border: 1px solid var(--global-border-color);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .hero-text { flex: 1 1 320px; min-width: 0; }
  .hero-name { font-size: 2.2rem; line-height: 1.1; margin: 0 0 0.35rem; letter-spacing: -0.02em; }
  .hero-role { font-size: 1.05rem; font-weight: 600; color: var(--global-link-color); margin: 0 0 1rem; }
  .hero-bio { font-size: 1.02rem; line-height: 1.7; margin: 0 0 1.25rem; }
  .hero-actions { display: flex; flex-wrap: wrap; gap: 0.6rem; }
  .hero-btn {
    display: inline-flex; align-items: center; gap: 0.45rem;
    padding: 0.45rem 0.9rem; border-radius: 999px;
    border: 1px solid var(--global-border-color);
    font-size: 0.9rem; font-weight: 600; text-decoration: none;
    color: var(--global-text-color); background: var(--global-bg-color);
    transition: all 0.15s ease-in-out;
  }
  .hero-btn:hover { border-color: var(--global-link-color); color: var(--global-link-color); transform: translateY(-1px); }
  .hero-btn--primary { background: var(--global-link-color); border-color: var(--global-link-color); color: #fff; }
  .hero-btn--primary:hover { color: #fff; filter: brightness(0.95); }

  /* Research */
  .research-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1.5rem; }
  .research-card {
    border: 1px solid var(--global-border-color); border-radius: 12px;
    padding: 1.1rem 1.2rem; background: var(--global-bg-color);
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .research-card:hover { transform: translateY(-2px); border-color: var(--global-link-color); }
  .research-card h3 { margin: 0 0 0.4rem; font-size: 1.05rem; }
  .research-card p { margin: 0; font-size: 0.94rem; line-height: 1.55; opacity: 0.9; }

  /* Talks */
  .talk-list { list-style: none; margin: 0; padding: 0; }
  .talk-item {
    display: flex; justify-content: space-between; align-items: baseline; gap: 1rem;
    padding: 0.85rem 0; border-bottom: 1px solid var(--global-border-color);
  }
  .talk-item:last-child { border-bottom: 0; }
  .talk-title { display: block; font-weight: 600; line-height: 1.4; }
  .talk-venue { display: block; font-size: 0.9rem; opacity: 0.8; margin-top: 0.15rem; }
  .talk-date { font-size: 0.85rem; opacity: 0.7; white-space: nowrap; }

  /* Contact */
  .contact-list { list-style: none; margin: 1.25rem 0 0; padding: 0; }
  .contact-list li { padding: 0.4rem 0; font-size: 1rem; }
  .contact-list i { width: 1.4rem; text-align: center; margin-right: 0.5rem; color: var(--global-link-color); }

  @media (max-width: 720px) {
    .hero-inner { flex-direction: column; text-align: center; gap: 1.5rem; }
    .hero-actions { justify-content: center; }
    .hero-name { font-size: 1.8rem; }
    .research-grid { grid-template-columns: 1fr; }
    .talk-item { flex-direction: column; gap: 0.25rem; }
  }
</style>

<div id="main" class="home" role="main">
  {{ content }}
</div>

<script>
  (function () {
    // Smooth-scroll internal nav links to their section, accounting for the
    // fixed masthead height, and keep the active tab highlighted (scrollspy).
    var header = document.querySelector('.masthead');

    function headerOffset() {
      return (header ? header.offsetHeight : 70) + 12;
    }

    var links = Array.prototype.slice.call(
      document.querySelectorAll('a.js-scroll-link[href*="#"]')
    ).filter(function (a) {
      var hash = a.getAttribute('href').split('#')[1];
      return hash && document.getElementById(hash);
    });

    links.forEach(function (link) {
      link.addEventListener('click', function (e) {
        var id = link.getAttribute('href').split('#')[1];
        var target = document.getElementById(id);
        if (!target) { return; }
        e.preventDefault();
        var top = target.getBoundingClientRect().top + window.pageYOffset - headerOffset();
        window.scrollTo({ top: top, behavior: 'smooth' });
        history.replaceState(null, '', '#' + id);
      });
    });

    // Scrollspy: mark the nav link for the section currently in view.
    var sections = links.map(function (link) {
      return document.getElementById(link.getAttribute('href').split('#')[1]);
    });

    function onScroll() {
      var pos = window.pageYOffset + headerOffset() + 4;
      var currentIndex = 0;
      for (var i = 0; i < sections.length; i++) {
        if (sections[i].offsetTop <= pos) { currentIndex = i; }
      }
      links.forEach(function (l, i) {
        l.classList.toggle('is-active', i === currentIndex);
      });
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('load', onScroll);
    onScroll();
  })();
</script>
